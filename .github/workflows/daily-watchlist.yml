name: Daily stock watchlist

on:
  schedule:
    # GitHub Actions uses UTC. Run twice and let Python handle Copenhagen DST.
    - cron: '15 12 * * 1-5'
    - cron: '15 13 * * 1-5'
  workflow_dispatch:

jobs:
  send-watchlist:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check email secrets
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          missing=0
          for name in SMTP_USER SMTP_PASSWORD EMAIL_TO; do
            if [ -z "${!name}" ]; then
              echo "::error title=Missing GitHub Actions secret::$name is missing. Open Settings -> Secrets and variables -> Actions -> Repository secrets, then create this exact name."
              missing=1
            else
              echo "$name is configured."
            fi
          done
          exit "$missing"

      - name: Send Danish stock watchlist
        env:
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python src/watchlist.py --force
          else
            python src/watchlist.py
          fi
